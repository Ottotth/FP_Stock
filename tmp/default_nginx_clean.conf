server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;
  root /var/www/html;
  index index.html;

  # Accept /api/* and rewrite to backend path without /api
  location ^~ /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy API endpoints used by the frontend, accept optional /api/ prefix (fallback)
  location ~ ^/(?:api/)?(heatMapData|stockdata|realTimeStock|recent30Data|stockNews|lastcandle|updateStock|realTimeStock)$ {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Static files and SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \\.(?:jpg|jpeg|gif|png|css|js|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public";
  }
}
