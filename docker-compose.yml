version: '3.8'

services:
  postgres:
    image: postgres:18
    container_name: postgres-container
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin1234}
      POSTGRES_DB: ${POSTGRES_DB:-stock_db}
      PGDATA: /var/lib/postgresql/data/pgdata18
    networks:
      - bootcamp-network
    ports:
      - "5532:5432"
    volumes:
      - pgdata18:/var/lib/postgresql/data/pgdata18
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis-container
    networks:
      - bootcamp-network
    ports:
      - "6479:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  data-provider-app:
    build:
      context: .
      dockerfile: _java/data-provider-app/Dockerfile
    container_name: data-provider-app
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-stock_db}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-admin1234}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    networks:
      - bootcamp-network
    restart: unless-stopped

  # heatmap-ui-app removed: frontend is now built into the Spring Boot image

networks:
  bootcamp-network:

volumes:
  pgdata18:
  redis_data:


