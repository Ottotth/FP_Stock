spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stock_db
    username: postgres
    password: admin1234
    driver-class-name: org.postgresql.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080


